<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My game</title>
    <link rel="icon" type="image/jpg" href="../src/img/icon.jpg">
    <link rel="stylesheet" href="../src/css/mainLevel.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"

            }
        }
    </script>
</head>
<body>
    <div id="container"></div>

    <div id="instructions">
        <h2>Modo PointerLock Activo</h2>
        <p>Haz clic en la escena para bloquear el cursor y activar el modo de control de primera persona.</p>
        <p><b>W, A, S, D</b> para moverse <br> <b>ESC</b> para desbloquear el cursor </p>
    </div>

    <div id="info-panel">
        <h3 id="control-title">OrbitControls</h3>
        <p id="control-desc">Cargando descripción...</p>
    </div>

    <audio loop autoplay id="miAudio2">
        <source src="../src/sounds/sound_game.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <script type="module" src="../src/js/mainLevel.js"></script>
</body>
</html>
